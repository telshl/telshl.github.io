{{ define "main" }}
<div class="page-container">
  {{ if not (findRE "<h1" .Content 1) }}
  <header class="page-header">
    <p class="section-label">{{ .Section | default "Index" }}</p>
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
  </header>
  {{ end }}

  <div class="prose page-content page-section-{{ .Section }}{{ with .File }} page-file-{{ .BaseFileName }}{{ end }}">{{ .Content }}</div>

  {{ if .Pages }}
  <ul class="year-list">
    {{ range .Pages }}
    <li class="year-item">
      <a href="{{ .Permalink }}" class="year-link">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
  {{ end }}
</div>
{{ end }}

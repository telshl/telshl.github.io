<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Params.name }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>羅</text></svg>">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-name">羅世宏</a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>

<main>
  {{ block "main" . }}{{ end }}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-name">{{ .Site.Params.name }}｜{{ .Site.Params.position }}</div>
    <div class="footer-links">
      <a href="{{ .Site.Params.substack }}" target="_blank" rel="noopener">Substack</a>
      <a href="mailto:{{ .Site.Params.email }}">Email</a>
    </div>
    <div class="footer-copy">
      © {{ now.Year }} {{ .Site.Params.nameEn }}. 國立中正大學傳播系.
    </div>
  </div>
</footer>

</body>
</html>

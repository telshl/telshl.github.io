<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Params.name }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>羅</text></svg>">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo" aria-label="羅世宏 首頁">
      <svg width="160" height="36" viewBox="0 0 160 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 六邊形徽章 -->
        <polygon points="18,2 30,9 30,23 18,30 6,23 6,9" fill="none" stroke="white" stroke-width="1.2"/>
        <text x="18" y="20" font-family="Georgia, serif" font-size="11" font-weight="400" fill="white" text-anchor="middle" letter-spacing="0.05em">SHL</text>
        <!-- 中文名 -->
        <text x="42" y="17" font-family="Noto Serif TC, serif" font-size="15" font-weight="300" fill="white" letter-spacing="0.06em">羅世宏</text>
        <!-- 英文名 -->
        <text x="42" y="29" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.5)" letter-spacing="0.12em">SHIH-HUNG LO</text>
      </svg>
    </a>
    <nav class="site-nav" id="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="開啟選單">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
<script>
  document.getElementById('nav-toggle').addEventListener('click', function() {
    var nav = document.getElementById('site-nav');
    var btn = document.getElementById('nav-toggle');
    nav.classList.toggle('open');
    btn.classList.toggle('open');
  });
</script>

<main>
  {{ block "main" . }}{{ end }}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-name">{{ .Site.Params.name }}｜{{ .Site.Params.position }}</div>
    <div class="footer-links">
      <a href="{{ .Site.Params.substack }}" target="_blank" rel="noopener">Substack</a>
      <a href="mailto:{{ .Site.Params.email }}">Email</a>
    </div>
    <div class="footer-copy">
      © {{ now.Year }} {{ .Site.Params.nameEn }}. 國立中正大學傳播系.
    </div>
  </div>
</footer>

</body>
</html>
